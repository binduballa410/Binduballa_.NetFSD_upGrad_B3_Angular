<!DOCTYPE html>
<html>
    <head>
        <style>
            button{
                padding: 8px;
                width:100px;
            }
            .completed{
                text-decoration: line-through;
                color:gray;
            }
            .deleteBtn{
                background-color: red;
                color:white;
                border:none;
                padding:5px 8px;
            }
        </style>
    </head>
    <body>
        <h1>Interactive To-Do-List</h1>
        <hr/>
        Enter Task:
        <input type="text" id="t1"/>
        <button id="addBtn">Add</button>
        <ul id="taskList"></ul>
        <h4>Total Tasks:<span id="totalCount">0</span></h4>
        <h4>Completed Tasks:<span id="completedCount">0</span></h4>

        <script  src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            $(document).ready(function(){
                function updateCounts() {
                    let total =$("#taskList li").length;
                    let completed = $("#taskList li.completed").length;
                    $("#totalCount").text(total);
                    $("#completedCount").text(completed);
                }
                $("#addBtn").on("click",function() {
                    let taskText = $("#t1").val().trim();
                    if(taskText === "") {
                        alert("Please enter a task");
                        return;
                    }
                    let li = $("<li></li>").text(taskText);
                    let deleteBtn = $("<button class='deleteBtn'>Delete</button>");
                    let completeBtn = $("<button class='completeBtn'>Completed</button>");
                    li.append(" ");
                    li.append(completeBtn);
                    li.append(" ");
                    li.append(deleteBtn);
                    $("#taskList").append(li);
                    $("#t1").val("");
                    updateCounts();
                });

               $("#taskList").on("click", ".completeBtn",function () {
                $(this).parent().toggleClass("completed");
                updateCounts();
               })

                $("#taskList").on("click",".deleteBtn", function() {
                    $(this).parent().remove();
                    updateCounts();
                });
            });
        </script>
    </body>
</html>
